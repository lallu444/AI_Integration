name: Naukri Update Everyday

on:
  schedule:
    # Triggers the workflow every 5 minutes (subject to GitHub Action queue delays)
    - cron: '30 5 * * *'
  workflow_dispatch: # Allows you to manually trigger it anytime via the Actions UI

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Adjust to '11' or '21' if your project targets a different JDK

      - name: Execute Selenium Tests on LambdaTest
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          mvn test \
            -DPlatform="LambdaTest" \
            -DBrowser="chrome" \
            -DMail="lallubanala444@gmail.com" \
            -DRole="QA analyst" \
            -DExperince="5 years" \
            -DLocation="Hyderabad"
